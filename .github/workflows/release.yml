name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Verify module
        run: |
          GOFLAGS=-mod=mod go mod verify
          echo "Module published at tag: ${{ github.ref_name }}"
